name: Mayara Radar Server
app_id: mayara
version: 1.0.0-1
upstream_version: latest
description: Marine radar display and ARPA tracking server
long_description: |
  Mayara is a radar middleware server that translates proprietary radar
  protocols from Navico, Raymarine, Furuno, Garmin, and Koden into an
  open Signal K-compatible API. It serves a real-time PPI radar display
  in the browser with ARPA target tracking and AIS integration.

  Features:
  - Real-time PPI radar display via web browser
  - ARPA target tracking with CPA/TCPA collision prediction
  - AIS vessel overlay
  - Radar controls (power, range, gain, clutter)
  - Built-in emulator for testing without hardware

homepage: https://github.com/MarineYachtRadar/mayara-server
maintainer: Stig Dreyer <stigdreyer@nxtmilestone.com>
license: MIT
tags:
  - role::container-app
  - field::ziganka
  - category::navigation
  - interface::web
  - use::monitoring
debian_section: web
architecture: all
depends:
  - docker.io (>= 20.10) | docker-ce (>= 20.10)
replaces:
  - boat-mayara-container
conflicts:
  - boat-mayara-container
web_ui:
  enabled: true
  path: /
  port: 6502
  protocol: http
  visible: true
routing:
  host_port: 6502
  auth:
    mode: none
layout:
  priority: 50
  width: 2
  height: 2
