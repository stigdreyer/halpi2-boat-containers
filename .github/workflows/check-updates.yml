name: Check for container image updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-check-image-updates
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    uses: halos-org/shared-workflows/.github/workflows/check-image-updates.yml@main
    with:
      compose-pattern: 'apps/*/docker-compose.yml'
