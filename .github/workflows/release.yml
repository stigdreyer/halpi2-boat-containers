name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential devscripts dpkg-dev debhelper lintian

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build packages
        run: ./tools/build-all.sh

      - name: Create GitHub Release with .deb files
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
