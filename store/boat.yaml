id: boat
name: Boat Media & Automation
description: |
  Applications for a HALPI2-based boat computer. Home Assistant for
  automation, Music Assistant for streaming + radio + local library, and a
  Snapcast client for HDMI audio playback.

icon: /usr/share/container-stores/boat/icon.svg

filters:
  # Tag-based filter — apps that ship with `field::boat` show up in this store
  include_tags:
    - field::boat

category_metadata:
