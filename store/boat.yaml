    label: Media
    icon: MusicIcon
    description: Music players, radio, and audio streaming

  - id: automation
    label: Automation
    icon: HomeAutomationIcon
    description: Home Assistant and related automation tooling

  - id: audio
    label: Audio Plumbing
    icon: SpeakerIcon
    description: Snapcast clients and audio routing components
